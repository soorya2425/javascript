<body>
    <p id="rice"></p>

    <script >
    let name1 = "Rice",rice_price = 50, rice_qty = 2;

    let name3 = "Wheat",wheat_price = 30, wheat_qty = 4;
    let rice_cost = rice_price * rice_qty;
    document.getElementById("rice").innerHTML =  " cost for Rice: ₹" + rice_cost;
    console.log("Cost for Rice: ₹" + rice_cost);

</script>
