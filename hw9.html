<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hw9</title>
</head>
<body>
    <script>
        function filterComment(comment) {

    let cleanedComment = comment.replace(/\b(bad|ugly|stupid)\b/gi, "***");

    let numbers = comment.match(/\d+/g);
    let numberCount = numbers ? numbers.length : 0;

    let capitalWords = comment.match(/\b[A-Z][a-zA-Z]*\b/g);
    let capitalCount = capitalWords ? capitalWords.length : 0;


    return {
        cleanedComment: cleanedComment,
        numberCount: numberCount,
        capitalWordCount: capitalCount
    };
}

let comment = "I think this movie was BAD and 100% Stupid! But the Acting was Amazing and 3 actors were great.";

let result = filterComment(comment);

console.log("Cleaned Comment:", result.cleanedComment);
console.log("Number Count:", result.numberCount);
console.log("Capitalized Words Count:", result.capitalWordCount);
    </script>
</body>
</html>
