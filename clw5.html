<!DOCTYPE html>
<html>
<head>
    <title>claswortk5</title>
</head>
<body>

<h2>Online Store - Return Check</h2>

<button onclick="checkReturn()">Check Return Eligibility</button>
<p id="result"></p>

<script>

    let order = {
        itemName: "Headphones",
        isDelivered: true,
        daysSinceDelivery: 5
    };

    let message = (order.isDelivered && order.daysSinceDelivery <= 7)
                  ? "Eligible for Return"
                  : "Return Period Expired";
   function checkReturn() {

    document.getElementById("result").innerText = message;
    console.log("itemName exists:", "itemName" in order);
    delete order.daysSinceDelivery;
    console.log("Updated object:", order);
}
</script>

</body>
</html>
