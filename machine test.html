<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <input type="number" id="num1" placeholder="Number">
    <input type="number" id="num2" placeholder="Number">

    <select id="operator">
        <option value=""></option>
        <option value="add">+</option>
        <option value="sub">-</option>
        <option value="multiply">*</option>
        <option value="divide">/</option>
    </select>

    <button onclick="calculate()">=</button>

    <p id="result"></p>

    <script>
        function add(a, b) { return a + b; }
        function sub(a, b) { return a - b; }
        function multiply(a, b) { return a * b; }
        function divide(a, b) { return a / b; }

        function calculate() {
            let n1 = parseFloat(document.getElementById("num1").value)
            let n2 = parseFloat(document.getElementById("num2").value)
            let op = document.getElementById("operator").value

            if (op === "add") {
                document.getElementById("result").innerHTML = "Result :- " + add(n1, n2)
            }
            else if (op === "sub") {
                document.getElementById("result").innerHTML = "Result :- " + sub(n1, n2)
            }
            else if (op === "multiply") {
                document.getElementById("result").innerHTML = "Result :- " + multiply(n1, n2)
            }
            else if (op === "divide") {
                document.getElementById("result").innerHTML = "Result :- " + divide(n1, n2)
            }
        }
    </script>
</body>

</html>
