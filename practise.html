







<!DOCTYPE html>
<html>
<body>

<h2>JavaScript Regular Expressions</h2>

<p>Search a string for "Mashupstack", and display the position of the match:</p>

<p id="demo"></p>

<script>
var str = "Visit Mashupstack/!"; 
var nam = str.search(/MASHUPSTACK/i);
document.getElementById("demo").innerHTML = nam;
</script>

</body>
</html>
