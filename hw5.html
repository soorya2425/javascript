<!DOCTYPE html>
<html>
<head>
    <title>Homework5</title>
</head>
<body>

<h2>User Profile Access</h2>

<button onclick="checkAccess()">Check Access</button>

<p id="output"></p>

<script>
function checkAccess() {

    let name = "Soorya";
    let age = 20;
    let isAdmin = true;

    let user = {
        name: name,
        age: age,
        isAdmin: isAdmin
    };


    let result = (user.age >= 18 && user.isAdmin)
                 ? "Access Granted"
                 : "Access Denied";

    document.getElementById("output").innerText = result;

    console.log("Age exists:", "age" in user);
    delete user.age;

    console.log("Updated user object:", user);
}
</script>

</body>
</html>
